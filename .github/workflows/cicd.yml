name: CI-CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  REGISTRY: docker.io
  # ====================================
  #   শুধু এই ৪টা পরিবর্তন করুন
  # ====================================
  BACKEND_DIR: assignment5-portal--backend
  FRONTEND_DIR: assignment5-portal--frontend
  SERVER_IMAGE: portal-server
  CLIENT_IMAGE: portal-client
  # ====================================

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install server deps
        working-directory: ./${{ env.BACKEND_DIR }}
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Generate Prisma client
        working-directory: ./${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Build server
        working-directory: ./${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run build

      - name: Install client deps
        working-directory: ./${{ env.FRONTEND_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Build client
        working-directory: ./${{ env.FRONTEND_DIR }}
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Normalize image namespace
        id: vars
        shell: bash
        run: |
          echo "namespace=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.BACKEND_DIR }}
          file: ./${{ env.BACKEND_DIR }}/Dockerfile
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          push: true
          tags: |
            docker.io/${{ steps.vars.outputs.namespace }}/${{ env.SERVER_IMAGE }}:latest
            docker.io/${{ steps.vars.outputs.namespace }}/${{ env.SERVER_IMAGE }}:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.FRONTEND_DIR }}
          file: ./${{ env.FRONTEND_DIR }}/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          push: true
          tags: |
            docker.io/${{ steps.vars.outputs.namespace }}/${{ env.CLIENT_IMAGE }}:latest
            docker.io/${{ steps.vars.outputs.namespace }}/${{ env.CLIENT_IMAGE }}:${{ github.sha }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker
    environment: production

    steps:
      - name: Normalize image namespace
        id: vars
        shell: bash
        run: |
          echo "namespace=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"

            if [ -z "$APP_DIR" ]; then
              echo "VPS_APP_DIR secret is empty."
              exit 1
            fi

            if [ ! -d "$APP_DIR" ]; then
              echo "VPS_APP_DIR does not exist: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            if [ -d .git ]; then
              git fetch --all --prune
              git checkout main
              git reset --hard ${{ github.sha }}
            fi

            printf '%s' "${{ secrets.SERVER_ENV_PRODUCTION }}" > ./${{ env.BACKEND_DIR }}/.env

            export REGISTRY=docker.io
            export IMAGE_NAMESPACE=${{ steps.vars.outputs.namespace }}
            export IMAGE_TAG=${{ github.sha }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d portalDB
            docker compose -f docker-compose.yml run --rm ${{ env.SERVER_IMAGE }} sh -c "npx prisma migrate deploy"
            docker compose -f docker-compose.yml up -d \
              ${{ env.SERVER_IMAGE }} \
              ${{ env.SERVER_IMAGE }}-2 \
              ${{ env.CLIENT_IMAGE }} \
              ${{ env.CLIENT_IMAGE }}-2
            docker image prune -f



            